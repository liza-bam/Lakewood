<style>
  html { scroll-behavior: smooth; }
  #root { min-height: 100vh; }
  /* Reveal-on-scroll base */
  .lw-reveal { opacity: 0; transform: translateY(18px); transition: opacity 640ms var(--ease-out), transform 640ms var(--ease-out); }
  .lw-reveal.is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .lw-reveal { opacity: 1 !important; transform: none !important; transition: none; }
    html { scroll-behavior: auto; }
  }
  /* native textarea matched to DS Input */
  .lw-textarea {
    font-family: var(--font-sans); font-size: var(--text-body); color: var(--text-body);
    background: var(--surface-card); border: 2px solid var(--border-on-white);
    border-radius: var(--radius-button); padding: 12px 14px; outline: none; resize: vertical;
    min-height: 110px; line-height: var(--leading-body); width: 100%;
    transition: border-color var(--duration-fast) var(--ease-out);
  }
  .lw-textarea:focus { border-color: var(--border-accent); }
  ul.lw-list { margin: 0; padding: 0; list-style: none; }
  /* Bebas Neue glyphs sit low in the line-box; reserve space so the last line never collides with the next element */
  h1, h2, h3 { padding-bottom: 0.12em; }
  /* keep the header wordmark on one line, drop the secondary est. tag for a clean mark */
  header span { white-space: nowrap; }
  header a > span + span { display: none; }

  /* ---------------- Responsive breakpoints ---------------- */
  /* Tablet: 3-up card grids become 2-up */
  @media (max-width: 1024px) {
    main [style*="repeat(3, 1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
  }
  /* ----- All breakpoints: equal-width hero CTAs ----- */
  .lw-hero__actions > button { flex: 1 1 0; width: 220px; justify-content: center; }
  /* ----- Desktop + tablet (≥761px): hero subtitle treatment ----- */
  @media (min-width: 761px) {
    .lw-hero__sub {
      font-size: clamp(3.5rem, 2.4vw, 28px) !important;
      color: rgb(255 255 255) !important;
      max-width: 34ch !important;
      line-height: 1.2 !important;
      padding-bottom: 20px !important;
      margin: 0px !important;
      font-family: var(--font-display) !important;
      letter-spacing: 1px !important;
      text-shadow: 0px 0px 3px #00000085 !important;
    }
  }
  /* ----- Desktop + tablet (≥761px): hero price treatment ----- */
  @media (min-width: 761px) {
    .lw-hero__price {
      text-transform: uppercase !important;
      font-size: 36px !important;
      color: rgb(255 255 255) !important;
      max-width: 34ch !important;
      line-height: 1.2 !important;
      padding-bottom: 20px !important;
      margin: 0px !important;
      font-family: var(--font-display) !important;
      letter-spacing: 1px !important;
      text-shadow: 0px 0px 3px #00000085 !important;
    }
    /* Inner Eyebrow span has inline font-size/color/font-family — override so the parent rule actually shows */
    .lw-hero__price > * {
      font-size: 36px !important;
      color: rgb(255 255 255) !important;
      font-family: var(--font-display) !important;
      letter-spacing: 1px !important;
      text-transform: uppercase !important;
      text-shadow: 0px 0px 3px #00000085 !important;
    }
  }
  /* ----- Mobile hero (≤760px) per design handoff: sky photo, glass hidden, sized to content ----- */
  @media (max-width: 760px) {
    .lw-hero__actions > button { max-width: none !important; width: 100% !important; }
    .lw-hero { min-height: auto !important; flex-direction: column !important; align-items: stretch !important; }
    .lw-hero__bg--desk { display: none !important; }
    .lw-hero__bg--mob { display: block !important; }
    .lw-hero__bg { object-position: center top !important; }
    .lw-hero__glass { display: none !important; }
    .lw-hero__topwash { background: linear-gradient(180deg, rgba(244,241,232,0.55) 0%, rgba(244,241,232,0) 32%) !important; }
    .lw-hero__content { padding-top: var(--space-12) !important; padding-bottom: var(--space-16) !important; gap: var(--space-3) !important; }
    .lw-hero__sub { display: none !important; }
    .lw-hero__logo { height: clamp(86px, 24vw, 128px) !important; }
    .lw-hero__title { font-size: clamp(2.75rem, 13.5vw, 5rem) !important; line-height: 0.98 !important; max-width: none !important; padding-bottom: 0.12em !important; }
    .lw-hero__actions { gap: var(--space-3) !important; flex-direction: column !important; align-items: stretch !important; width: 100% !important; }
    /* Keep the price line on a single line on mobile */
    .lw-hero__price > * { font-size: clamp(12px, 3.4vw, 15px) !important; letter-spacing: 0.1em !important; white-space: nowrap !important; }
  }
  /* Mobile: single column everywhere + tighter vertical rhythm */
  @media (max-width: 760px) {
    :root { --space-32: 72px; --space-24: 56px; --space-20: 52px; --space-16: 44px; --space-12: 36px; }
    main [style*="repeat(3, 1fr)"],
    main [style*="repeat(2, 1fr)"],
    main [style*="1fr 1fr"],
    main [style*="0.8fr 1.2fr"],
    main [style*="1.15fr 0.85fr"] { grid-template-columns: 1fr !important; }
    [role="dialog"] [style*="1fr 1fr"] { grid-template-columns: 1fr !important; }
  }
  /* Footer collapses */
  @media (max-width: 900px) {
    footer [style*="1.4fr 1fr 1fr 1fr auto"] { grid-template-columns: 1fr 1fr !important; gap: var(--space-8) !important; }
  }
  @media (max-width: 540px) {
    footer [style*="1.4fr 1fr 1fr 1fr auto"] { grid-template-columns: 1fr !important; }
  }
</style>
