<style>
  html { scroll-behavior: smooth; }
  #root { min-height: 100vh; }
  /* Reveal-on-scroll base */
  .lw-reveal { opacity: 0; transform: translateY(18px); transition: opacity 640ms var(--ease-out), transform 640ms var(--ease-out); }
  .lw-reveal.is-in { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    .lw-reveal { opacity: 1 !important; transform: none !important; transition: none; }
    html { scroll-behavior: auto; }
  }
  /* native textarea matched to DS Input */
  .lw-textarea {
    font-family: var(--font-sans); font-size: var(--text-body); color: var(--text-body);
    background: var(--surface-card); border: 2px solid var(--border-on-white);
    border-radius: var(--radius-button); padding: 12px 14px; outline: none; resize: vertical;
    min-height: 110px; line-height: var(--leading-body); width: 100%;
    transition: border-color var(--duration-fast) var(--ease-out);
  }
  .lw-textarea:focus { border-color: var(--border-accent); }
  ul.lw-list { margin: 0; padding: 0; list-style: none; }
  /* Bebas Neue glyphs sit low in the line-box; reserve space so the last line never collides with the next element */
  h1, h2, h3 { padding-bottom: 0.12em; }
  /* keep the header wordmark on one line, drop the secondary est. tag for a clean mark */
  header span { white-space: nowrap; }
  header a > span + span { display: none; }

  /* ---------------- Responsive breakpoints ---------------- */
  /* Tablet: 3-up card grids become 2-up */
  @media (max-width: 1024px) {
    main [style*="repeat(3, 1fr)"] { grid-template-columns: repeat(2, 1fr) !important; }
  }
  /* ----- Mobile-only hero overrides (desktop layout untouched) ----- */
  @media (max-width: 760px) {
    .lw-hero { min-height: 92vh !important; align-items: flex-end !important; }
    /* Swap to the portrait dock photo on mobile */
    .lw-hero__photo {
      content: url("assets/photos/mobile-hero.jpg") !important;
      object-position: center 35% !important;
    }
    /* Top frosted band — holds the centered logo on a light background */
    .lw-hero__topfade {
      inset: 0 0 auto 0 !important;
      height: 320px !important;
      background: linear-gradient(180deg, rgba(244,241,232,0.95) 0%, rgba(244,241,232,0.82) 60%, rgba(244,241,232,0) 100%) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 65%, rgba(0,0,0,0) 100%) !important;
      mask-image: linear-gradient(180deg, #000 0%, #000 65%, rgba(0,0,0,0) 100%) !important;
    }
    .lw-hero__eyebrow,
    .lw-hero__subtitle { display: none !important; }
    /* Bottom frosted band */
    .lw-hero__glass {
      inset: auto 0 0 0 !important;
      height: 55% !important;
      background: linear-gradient(180deg, rgba(244,241,232,0) 0%, rgba(244,241,232,0.55) 35%, rgba(244,241,232,0.92) 100%) !important;
      -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0) 0%, #000 32%, #000 100%) !important;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0) 0%, #000 32%, #000 100%) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
    }
    /* Hide both logos on mobile per direction (no upper logo on mobile) */
    .lw-hero__logo-desktop,
    .lw-hero__logo { display: none !important; }
    /* Inner: full width, tight padding, sits at bottom in the glass */
    .lw-hero__inner {
      padding: 0 var(--space-5) var(--space-6) !important;
      max-width: none !important;
      gap: var(--space-3) !important;
    }
    .lw-hero__title {
      font-size: clamp(3.4rem, 15vw, 112px) !important;
      line-height: 0.95 !important;
      max-width: none !important;
      width: 100% !important;
      padding-bottom: 0.1em !important;
    }
    .lw-hero__price > * {
      font-size: clamp(13px, 3.2vw, 18px) !important;
      white-space: nowrap !important;
    }
  }
  /* Mobile: single column everywhere + tighter vertical rhythm */
  @media (max-width: 760px) {
    :root { --space-32: 72px; --space-24: 56px; --space-20: 52px; --space-16: 44px; --space-12: 36px; }
    main [style*="repeat(3, 1fr)"],
    main [style*="repeat(2, 1fr)"],
    main [style*="1fr 1fr"],
    main [style*="0.8fr 1.2fr"],
    main [style*="1.15fr 0.85fr"] { grid-template-columns: 1fr !important; }
    [role="dialog"] [style*="1fr 1fr"] { grid-template-columns: 1fr !important; }
  }
  /* Footer collapses */
  @media (max-width: 900px) {
    footer [style*="1.4fr 1fr 1fr 1fr auto"] { grid-template-columns: 1fr 1fr !important; gap: var(--space-8) !important; }
  }
  @media (max-width: 540px) {
    footer [style*="1.4fr 1fr 1fr 1fr auto"] { grid-template-columns: 1fr !important; }
  }
</style>
